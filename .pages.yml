media:
  input: media
  output: /media

content:
  - name: posts
    label: Writing
    type: collection
    path: content/posts
    format: yaml-frontmatter
    filename:
      template: "{fields.slug}.md"
      field: create
    view:
      fields: [title, published, date, category]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: URL slug
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          message: Use lowercase letters, numbers and hyphens only.
      - name: description
        label: Search and social description
        type: text
        required: true
        options:
          minlength: 50
          maxlength: 180
      - name: category
        label: Category
        type: select
        required: true
        options:
          values: [Applied AI, Cloud architecture, Cloud delivery, Delivery, Modernization, Technical leadership]
      - name: date
        label: Publish date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: dateDisplay
        label: Display date
        type: string
        required: true
        description: For example, December 15, 2025.
      - name: readTime
        label: Reading time
        type: string
        required: true
        description: For example, 8 min read.
      - name: published
        label: Published
        type: boolean
        default: true
      - name: topicTags
        label: Tags
        type: string
        list: true
      - name: body
        label: Article
        type: rich-text
        required: true
        options:
          format: html
          path: blog
          rename: true

  - name: work
    label: Work
    type: collection
    path: content/work
    format: yaml-frontmatter
    filename: "{fields.slug}.md"
    view:
      fields: [title, organisation, period, published]
      primary: title
      sort: [order, title]
      default:
        sort: order
        order: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Anchor slug
        type: string
        required: true
        pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      - name: organisation
        label: Organisation
        type: string
        required: true
      - name: period
        label: Period
        type: string
        required: true
      - name: category
        label: Category
        type: string
        required: true
      - name: order
        label: Display order
        type: number
        required: true
      - name: published
        label: Published
        type: boolean
        default: true
      - name: summary
        label: Summary
        type: text
        required: true
      - name: capabilities
        label: Technology or capability tags
        type: string
        list: true
      - name: facts
        label: Detail points
        type: object
        list:
          min: 1
          collapsible:
            collapsed: true
            summary: "{label}"
        fields:
          - name: label
            label: Label
            type: string
            required: true
          - name: text
            label: Description
            type: text
            required: true

settings:
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "content: add {name} via Pages CMS"
      update: "content: update {name} via Pages CMS"
      delete: "content: remove {name} via Pages CMS"
      rename: "content: rename {oldFilename} to {newFilename} via Pages CMS"
